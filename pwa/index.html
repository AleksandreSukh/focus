<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Focus Tasks</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Focus PWA</p>
          <h1>Focus Tasks</h1>
          <p class="app-subtitle">Private static task list with GitHub PAT sync.</p>
        </div>
        <div class="header-actions">
          <button id="settings-toggle" class="secondary-button" hidden>Connection settings</button>
          <button id="install-button" class="install-button" hidden>Install app</button>
        </div>
      </header>

      <section class="status-panel">
        <div>
          <p id="sync-status" class="sync-status">Connection required.</p>
          <p id="sync-detail" class="status-detail"></p>
        </div>
        <button id="retry-sync" class="secondary-button" hidden>Retry sync</button>
      </section>

      <section id="screen-root"></section>

      <section id="tasks-view" hidden>
        <form id="add-form" class="add-form">
          <label for="add-input" class="sr-only">Add a task</label>
          <input id="add-input" name="task" type="text" maxlength="120" placeholder="Add a task" required />
          <button type="submit">Add</button>
        </form>

        <ul id="task-list" class="task-list" aria-live="polite"></ul>
        <section id="settings-root" hidden></section>
      </section>

      <section id="install-fallback" class="install-fallback" hidden>
        <h2>Install on Android</h2>
        <p>
          If the install button is not shown, open Chrome menu and choose
          <strong>Install app</strong> or <strong>Add to Home screen</strong>.
        </p>
      </section>
    </main>

    <script src="./runtime-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
