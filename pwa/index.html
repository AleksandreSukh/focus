<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Focus Maps</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Focus PWA</p>
          <h1>Focus Maps</h1>
          <p class="app-subtitle">Private static mind-map browser and task editor with GitHub PAT sync.</p>
        </div>
        <div class="header-actions">
          <button id="status-toggle" class="secondary-button status-launch-button" data-focus-key="status-toggle">Status</button>
          <button id="settings-toggle" class="secondary-button" data-focus-key="settings-toggle" hidden>Connection settings</button>
          <button id="install-button" class="install-button" hidden>Install app</button>
        </div>
      </header>

      <section id="screen-root"></section>
      <section id="app-root" hidden></section>
      <section id="status-root" hidden></section>
      <section id="settings-root" hidden></section>

      <section id="install-fallback" class="install-fallback" hidden>
        <h2>Install on Android</h2>
        <p>
          If the install button is not shown, open Chrome menu and choose
          <strong>Install app</strong> or <strong>Add to Home screen</strong>.
        </p>
      </section>
    </main>

    <script src="./runtime-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
