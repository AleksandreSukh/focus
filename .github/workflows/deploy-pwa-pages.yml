name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'pwa/**'
      - '.github/workflows/deploy-pwa-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site artifact
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp -R pwa/. dist/
          test -f dist/index.html
          test -f dist/app.js
          test -f dist/runtime-config.js

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
